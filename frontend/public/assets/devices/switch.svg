<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="sw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="sw-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glass container -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#14151B" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.4" />
  <!-- Glowing core icon -->
  <g filter="url(#sw-glow)">
    <!-- Switch chassis -->
    <rect x="14" y="20" width="36" height="24" rx="4" fill="url(#sw-grad)" stroke="#3B82F6" stroke-width="2" />
    <!-- Ethernet Ports -->
    <rect x="18" y="28" width="6" height="6" rx="1" fill="#14151B" stroke="#3B82F6" stroke-width="1" />
    <rect x="26" y="28" width="6" height="6" rx="1" fill="#14151B" stroke="#3B82F6" stroke-width="1" />
    <rect x="34" y="28" width="6" height="6" rx="1" fill="#14151B" stroke="#3B82F6" stroke-width="1" />
    <rect x="42" y="28" width="6" height="6" rx="1" fill="#14151B" stroke="#3B82F6" stroke-width="1" />
    <!-- Glowing green link status lights -->
    <circle cx="21" cy="24" r="1" fill="#10B981" />
    <circle cx="29" cy="24" r="1" fill="#10B981" />
    <circle cx="37" cy="24" r="1" fill="#F59E0B" />
    <circle cx="45" cy="24" r="1" fill="#10B981" />
    <!-- Internal cross-routing arrow lines -->
    <path d="M21 38H43M21 38L25 35M21 38L25 41M43 38L39 35M43 38L39 41" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.8" />
  </g>
</svg>
