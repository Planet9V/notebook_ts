<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="rtu-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="rtu-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glass container -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#14151B" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.4" />
  <!-- Glowing core icon -->
  <g filter="url(#rtu-glow)">
    <!-- Device enclosure box -->
    <rect x="20" y="28" width="24" height="22" rx="3" fill="url(#rtu-grad)" stroke="#F59E0B" stroke-width="2" />
    <!-- Central antenna mast -->
    <line x1="32" y1="28" x2="32" y2="14" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" />
    <circle cx="32" cy="13" r="2.5" fill="#EF4444" stroke="#FFFFFF" stroke-width="0.5" />
    <!-- Broadcast waves radiating from antenna tip -->
    <path d="M26 13C26 13 29 10 32 10C35 10 38 13 38 13" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7" />
    <path d="M22 17C22 17 27 13 32 13C37 13 42 17 42 17" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4" />
    <!-- Telemetry status indicator panel on enclosure -->
    <rect x="25" y="34" width="14" height="6" rx="1" fill="#14151B" stroke="#F59E0B" stroke-width="1" />
    <!-- Digital signal bar graphs -->
    <line x1="28" y1="38" x2="28" y2="36" stroke="#10B981" stroke-width="1.5" />
    <line x1="31" y1="38" x2="31" y2="35" stroke="#10B981" stroke-width="1.5" />
    <line x1="34" y1="38" x2="34" y2="37" stroke="#10B981" stroke-width="1.5" />
  </g>
</svg>
