<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="plc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="plc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glass container -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#14151B" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4" />
  <!-- Glowing core icon -->
  <g filter="url(#plc-glow)">
    <!-- PLC Module Chassis -->
    <rect x="18" y="14" width="28" height="36" rx="4" fill="url(#plc-grad)" stroke="#10B981" stroke-width="2" />
    <!-- Vertical modular slots -->
    <line x1="25" y1="14" x2="25" y2="50" stroke="#14151B" stroke-width="1.5" />
    <line x1="32" y1="14" x2="32" y2="50" stroke="#14151B" stroke-width="1.5" />
    <line x1="39" y1="14" x2="39" y2="50" stroke="#14151B" stroke-width="1.5" />
    <!-- LED Indicators (active) -->
    <circle cx="21" cy="20" r="1.5" fill="#10B981" />
    <circle cx="21" cy="26" r="1.5" fill="#10B981" />
    <circle cx="21" cy="32" r="1.5" fill="#3B82F6" />
    <circle cx="21" cy="38" r="1.5" fill="#EF4444" />
    <!-- Wiring terminal blocks -->
    <rect x="42" y="18" width="2" height="4" rx="0.5" fill="#FFFFFF" fill-opacity="0.8" />
    <rect x="42" y="26" width="2" height="4" rx="0.5" fill="#FFFFFF" fill-opacity="0.8" />
    <rect x="42" y="34" width="2" height="4" rx="0.5" fill="#FFFFFF" fill-opacity="0.8" />
    <rect x="42" y="42" width="2" height="4" rx="0.5" fill="#FFFFFF" fill-opacity="0.8" />
  </g>
</svg>
