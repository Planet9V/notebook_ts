<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="hist-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="hist-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glass container -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#14151B" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.4" />
  <!-- Glowing core icon -->
  <g filter="url(#hist-glow)">
    <!-- Top database cylinder -->
    <path d="M18 18C18 15 46 15 46 18V24C46 27 18 27 18 24V18Z" fill="url(#hist-grad)" stroke="#06B6D4" stroke-width="2" />
    <ellipse cx="32" cy="18" rx="14" ry="3" fill="#14151B" stroke="#06B6D4" stroke-width="1.5" />
    
    <!-- Middle database cylinder -->
    <path d="M18 28C18 25 46 25 46 28V34C46 37 18 37 18 34V28Z" fill="url(#hist-grad)" stroke="#06B6D4" stroke-width="2" />
    <ellipse cx="32" cy="28" rx="14" ry="3" fill="#14151B" stroke="#06B6D4" stroke-width="1.5" />
    
    <!-- Bottom database cylinder -->
    <path d="M18 38C18 35 46 35 46 38V44C46 47 18 47 18 44V38Z" fill="url(#hist-grad)" stroke="#06B6D4" stroke-width="2" />
    <ellipse cx="32" cy="38" rx="14" ry="3" fill="#14151B" stroke="#06B6D4" stroke-width="1.5" />
    
    <!-- Status LEDs on cylinder fronts -->
    <circle cx="24" cy="21" r="1" fill="#10B981" />
    <circle cx="24" cy="31" r="1" fill="#10B981" />
    <circle cx="24" cy="41" r="1" fill="#10B981" />
  </g>
</svg>
