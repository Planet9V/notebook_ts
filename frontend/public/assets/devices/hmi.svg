<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="hmi-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="hmi-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glass container -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#14151B" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.4" />
  <!-- Glowing core icon -->
  <g filter="url(#hmi-glow)">
    <!-- Monitor Bezel -->
    <rect x="12" y="16" width="40" height="28" rx="4" fill="#14151B" stroke="#8B5CF6" stroke-width="2" />
    <!-- Glass Display Screen -->
    <rect x="15" y="19" width="34" height="22" rx="2" fill="url(#hmi-grad)" />
    <!-- Stand / Base -->
    <path d="M26 44L22 49H42L38 44H26Z" fill="#14151B" stroke="#8B5CF6" stroke-width="1.5" stroke-linejoin="round" />
    <!-- Graphical UI Lines on screen -->
    <path d="M18 30L24 24L30 28L42 22" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9" />
    <!-- Tap target node -->
    <circle cx="42" cy="22" r="3" fill="#EC4899" stroke="#FFFFFF" stroke-width="1" />
  </g>
</svg>
