<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Connection Lines forming a T -->
  <g class="connections">
    <!-- Top Bar Connections -->
    <path d="M60 70L120 70" stroke="url(#lineGradient)" stroke-width="6" stroke-linecap="round"/>
    <path d="M120 70L180 70" stroke="url(#lineGradient)" stroke-width="6" stroke-linecap="round"/>
    <!-- Vertical Stem Connection -->
    <path d="M120 70L120 175" stroke="url(#lineGradient)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Nodes forming a T -->
  <g class="nodes">
    <!-- Top-Center (Central) Node -->
    <circle cx="120" cy="70" r="20" fill="url(#nodeGradient)"/>
    <circle cx="120" cy="70" r="26" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Top-Left Node -->
    <circle cx="60" cy="70" r="14" fill="url(#nodeGradient)"/>
    <circle cx="60" cy="70" r="20" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Top-Right Node -->
    <circle cx="180" cy="70" r="14" fill="url(#nodeGradient)"/>
    <circle cx="180" cy="70" r="20" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Bottom Node -->
    <circle cx="120" cy="175" r="16" fill="url(#nodeGradient)"/>
    <circle cx="120" cy="175" r="22" stroke="url(#nodeGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Pulse Animation -->
  <style>
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    .nodes circle {
      animation: pulse 3s infinite ease-in-out;
    }
    .nodes circle:nth-child(2n) {
      animation-delay: 1s;
    }
    .nodes circle:nth-child(3n) {
      animation-delay: 2s;
    }
  </style>
</svg>