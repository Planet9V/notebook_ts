port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

# Development keys — replace with production keys for deployment
keys:
  devkey: secret

logging:
  level: info

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 10

# Turn server configuration (for NAT traversal)
turn:
  enabled: true
  udp_port: 3478
