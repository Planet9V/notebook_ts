services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user ${SURREAL_USER:-root} --pass ${SURREAL_PASSWORD:-root} rocksdb:/mydata/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    pull_policy: always

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: tetrel_research
      POSTGRES_USER: tetrel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tetrel_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tetrel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  open_notebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: lfnovo/open_notebook:local
    ports:
      - "8502:8502"  # Web UI
      - "5055:5055"  # REST API
    environment:
      # REQUIRED: Change this to your own secret string
      # This encrypts your API keys in the database
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY}

      # Database connection (default values - no need to change)
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASSWORD=${SURREAL_PASSWORD:-root}
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook

      # Postgres (research memory)
      - POSTGRES_DSN=postgresql://tetrel:${POSTGRES_PASSWORD:-tetrel_dev}@postgres:5432/tetrel_research

      # Voice AI — must match whisper-stt container model
      - WHISPER__MODEL=Systran/faster-whisper-base
      - TTS_BATCH_SIZE=1
    volumes:
      - ./notebook_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME:-~}/.gemini:/root/.gemini
    depends_on:
      - surrealdb
      - postgres
    restart: always

  # ─── Voice AI Services ───────────────────────────────────────────────
  livekit-server:
    image: livekit/livekit-server@sha256:b617bb3363f13e880a82164692d842681276bc6eed7da46092f9ddb22017b927
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"     # HTTP API + WebSocket
      - "7881:7881"     # WebRTC (TCP)
      - "3478:3478/udp" # TURN (UDP)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu@sha256:a9703644dd7aa6b672db6b1f1490c4262c42210a26f9e7f8243cb251e32e9600
    ports:
      - "8880:8880"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8880/v1/audio/voices\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  whisper-stt:
    image: fedirz/faster-whisper-server@sha256:760e5e43d427dc6cfbbc4731934b908b7de9c7e6d5309c6a1f0c8c923a5b6030
    ports:
      - "8881:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
      - WHISPER__COMPUTE_TYPE=int8
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - whisper_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

volumes:
  whisper_models:
  postgres_data:
